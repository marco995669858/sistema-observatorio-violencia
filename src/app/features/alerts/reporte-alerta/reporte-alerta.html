<div class="form-wrapper animate-fade">
  <div class="alert-card">

    <header class="card-header">
      <div class="icon-circle">🚨</div>
      <h2>Reporte de Alerta Segura</h2>
      <p>Ubica el incidente para una respuesta efectiva del Observatorio.</p>
    </header>

    <form [formGroup]="alertForm" (ngSubmit)="onSubmit()" class="alert-form">

      <!-- Fila 1: Tipo de Incidente -->
      <div class="form-group">
        <label>Tipo de Incidente</label>
        <div class="select-wrapper">
          <select formControlName="tipo" class="form-control">
            @for (tipo of tipos; track tipo) {
            <option [value]="tipo">{{ tipo }}</option>
            }
          </select>
        </div>
      </div>

      <!-- UBICACIÓN: Grilla de combos -->
      <div class="location-grid">
        <div class="form-group">
          <label>Departamento</label>
          <div class="select-wrapper">
            <select formControlName="departamento" class="form-control">
              <option value="" disabled selected>Seleccione...</option>
              @for (dept of departamentos; track dept) {
              <option [value]="dept">{{ dept }}</option>
              }
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Provincia</label>
          <div class="select-wrapper">
            <select formControlName="provincia" class="form-control">
              <option value="" disabled selected>Seleccione...</option>
              @for (prov of provincias; track prov) {
              <option [value]="prov">{{ prov }}</option>
              }
            </select>
          </div>
        </div>

        <div class="form-group full-width">
          <label>Distrito</label>
          <div class="select-wrapper">
            <select formControlName="distrito" class="form-control">
              <option value="" disabled selected>Seleccione...</option>
              @for (dist of distritos; track dist) {
              <option [value]="dist">{{ dist }}</option>
              }
            </select>
          </div>
        </div>
      </div>

      <!-- Nivel de Riesgo -->
      <div class="form-group">
        <label>Nivel de Riesgo Estimado</label>
        <div class="segmented-control">
          @for (nivel of niveles; track nivel) {
          <button type="button" class="segment-btn" [class.active]="alertForm.get('riesgo')?.value === nivel"
            (click)="setRiesgo(nivel)">
            {{ nivel }}
          </button>
          }
        </div>
      </div>

      <!-- Descripción -->
      <div class="form-group">
        <label>Descripción de los hechos</label>
        <textarea formControlName="descripcion" class="form-control" rows="3"
          placeholder="¿Qué sucedió? Escribe detalles relevantes..."></textarea>
      </div>

      <!-- Acciones -->
      <div class="form-actions">
        <button type="button" class="btn-cancelar">Cancelar</button>
        <button type="submit" [disabled]="alertForm.invalid" class="btn-enviar">ENVIAR ALERTA</button>
      </div>

    </form>
  </div>
</div>
