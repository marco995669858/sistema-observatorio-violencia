<div class="reporte-wrapper animate-fade">
  <div class="reporte-card">

    <header class="card-header">
      <div class="icon-circle">✉️</div>
      <h2>Enviar Reporte Territorial</h2>
      <p>Genera y envía un informe de situación a las autoridades competentes basado en la ubicación seleccionada.</p>
    </header>

    <!-- Mensaje de Éxito -->
    @if (successMessage()) {
    <div class="success-alert animate-fade">
      <span class="icon">✅</span>
      <div class="text">
        <strong>¡Reporte Enviado!</strong>
        <p>El correo ha sido enviado exitosamente al destinatario.</p>
      </div>
      <button class="btn-close-alert" (click)="successMessage.set(false)">✖</button>
    </div>
    }

    <form [formGroup]="reportForm" (ngSubmit)="enviarReporte()" class="reporte-form">

      <!-- SECCIÓN: DESTINATARIO -->
      <div class="form-section">
        <h3 class="section-title">Datos de Envío</h3>

        <div class="form-group">
          <label>Correo Electrónico de Destino</label>
          <div class="input-wrapper">
            <span class="input-icon">@</span>
            <input type="email" formControlName="destinatario" class="form-control with-icon"
              placeholder="autoridad@institucion.gob.pe">
          </div>
        </div>

        <div class="form-group">
          <label>Asunto del Correo</label>
          <input type="text" formControlName="asunto" class="form-control"
            placeholder="Ej. Reporte de Riesgo Nivel Alto">
        </div>
      </div>

      <div class="divider"></div>

      <!-- SECCIÓN: UBICACIÓN (CASCADA) -->
      <div class="form-section">
        <h3 class="section-title">Filtro Geográfico</h3>

        <div class="location-grid">
          <div class="form-group">
            <label>Departamento</label>
            <div class="select-wrapper">
              <select formControlName="departamento" class="form-control">
                <option value="" disabled selected>Seleccione...</option>
                @for (dept of departamentos; track dept) {
                <option [value]="dept">{{ dept }}</option>
                }
              </select>
            </div>
          </div>

          <div class="form-group">
            <label>Provincia</label>
            <div class="select-wrapper">
              <select formControlName="provincia" class="form-control">
                <option value="" disabled selected>Seleccione...</option>
                @for (prov of provincias; track prov) {
                <option [value]="prov">{{ prov }}</option>
                }
              </select>
            </div>
          </div>

          <div class="form-group full-width">
            <label>Distrito</label>
            <div class="select-wrapper">
              <select formControlName="distrito" class="form-control">
                <option value="" disabled selected>Seleccione...</option>
                @for (dist of distritos; track dist) {
                <option [value]="dist">{{ dist }}</option>
                }
              </select>
            </div>
          </div>
        </div>
      </div>

      <div class="form-group mt-3">
        <label>Mensaje Adicional / Contexto</label>
        <textarea formControlName="mensaje" class="form-control" rows="3"
          placeholder="Añade observaciones para el destinatario..."></textarea>
      </div>

      <!-- BOTONES -->
      <div class="form-actions">
        <button type="button" class="btn-cancelar" (click)="reportForm.reset()">Limpiar</button>
        <button type="submit" [disabled]="reportForm.invalid || isSubmitting()" class="btn-enviar">
          @if (isSubmitting()) {
          <span class="spinner"></span> Procesando...
          } @else {
          <span>📤 ENVIAR REPORTE</span>
          }
        </button>
      </div>

    </form>
  </div>
</div>
